<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vendredi — Full body + Cardio actif</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e8e8e8;padding:20px 16px 40px;max-width:480px;margin:0 auto;-webkit-user-select:none;user-select:none}.header{text-align:center;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #222}.day-label{display:inline-block;background:#22c55e;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:4px 14px;border-radius:20px;margin-bottom:10px}h1{font-size:22px;font-weight:700;margin-bottom:4px}.subtitle{font-size:13px;color:#888}.warmup{background:#1a1a2e;border-left:3px solid #5b8dee;border-radius:8px;padding:14px 16px;margin-bottom:24px}.warmup-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#5b8dee;font-weight:700;margin-bottom:6px}.warmup-text{font-size:15px;line-height:1.4}.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#555;font-weight:700;margin-bottom:12px;margin-top:8px}.exercise-card{background:#151515;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #222;position:relative;cursor:pointer;transition:border-color .3s,opacity .3s;overflow:hidden}.exercise-card.active{border-color:#22c55e}.exercise-card.completed{opacity:.35;border-color:#333}.exercise-card.completed .exercise-name::after{content:' ✓';color:#4ade80}.exercise-card.cardio{border-color:#f59e0b}.exercise-number{position:absolute;top:16px;right:16px;width:28px;height:28px;background:#222;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#666}.exercise-name{font-size:17px;font-weight:600;margin-bottom:10px;padding-right:40px}.exercise-meta{display:flex;gap:16px;margin-bottom:10px}.meta-box{background:#0a0a0a;border-radius:8px;padding:8px 12px;text-align:center;flex:1}.meta-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#666;margin-bottom:2px}.meta-value{font-size:16px;font-weight:700;color:#22c55e}.tip{font-size:13px;color:#999;line-height:1.4;padding-left:12px;border-left:2px solid #333}.tracker{display:none;margin-top:14px;padding-top:14px;border-top:1px solid #222}.exercise-card.active .tracker{display:block}.sets-row{display:flex;gap:8px;margin-bottom:14px;justify-content:center}.set-pill{width:44px;height:44px;border-radius:50%;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#666;transition:all .3s}.set-pill.current{border-color:#22c55e;color:#22c55e;box-shadow:0 0 12px rgba(34,197,94,.3)}.set-pill.done{background:#22c55e;border-color:#22c55e;color:#fff}.timer-display{text-align:center;margin-bottom:14px}.timer-time{font-size:56px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1;margin-bottom:4px;transition:color .3s}.timer-time.work{color:#22c55e}.timer-time.rest{color:#5b8dee}.timer-time.done-color{color:#4ade80}.timer-time.cardio-color{color:#f59e0b}.timer-label{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:#666}.btn-row{display:flex;gap:10px;justify-content:center}.btn{padding:12px 24px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .2s;-webkit-tap-highlight-color:transparent}.btn:active{transform:scale(.95)}.btn-primary{background:#22c55e;color:#fff;flex:1}.btn-secondary{background:#222;color:#aaa}.btn-cardio{background:#f59e0b;color:#fff;flex:1}.progress-bar{width:100%;height:3px;background:#222;border-radius:2px;margin-top:12px;overflow:hidden}.progress-fill{height:100%;border-radius:2px;transition:width .3s}.progress-fill.work{background:#22c55e}.progress-fill.rest{background:#5b8dee}.progress-fill.cardio{background:#f59e0b}.footer{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid #222;color:#444;font-size:12px}.hint{text-align:center;background:#1a1a1a;border-radius:8px;padding:10px;margin-top:20px;font-size:12px;color:#666}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}.timer-time.resting{animation:pulse 1.5s ease-in-out infinite}
</style>
</head>
<body>
<div class="header"><div class="day-label">Vendredi</div><h1>Full body + Cardio actif</h1><div class="subtitle">Phase 1 — 25 min, échauffement compris</div></div>
<div class="warmup"><div class="warmup-title">Échauffement — 5 min</div><div class="warmup-text">Marche rapide tapis, inclinaison 4%</div></div>
<div class="section-title">Exercices</div><div id="exercises"></div>
<div class="hint">Tape sur un exercice pour démarrer le suivi</div>
<div class="footer">Coach Boris — Phase 1, Semaines 1-2</div>
<script>
var exercises=[{name:"Diverging Seated Row",sets:3,reps:"10",rest:30,weight:"30 kg",tip:"Rythme soutenu"},{name:"Rear Delt",sets:3,reps:"12",rest:30,weight:"20 kg",tip:"Ouvrir bras vers l'arrière, excellent posture"},{name:"Leg Press",sets:3,reps:"10",rest:45,weight:"30 kg",tip:"Poids modéré, enchaîner avec énergie"},{name:"Rotary Torso",sets:2,reps:"15/côté",rest:30,weight:"25 kg",tip:"Rotation contrôlée"},{name:"Stairmaster",sets:1,reps:"8 min",rest:0,weight:"—",tip:"Rythme soutenu, vider le réservoir",isCardio:true,cardioDuration:480}];var activeIndex=-1;var timers=exercises.map(function(){return{currentSet:0,phase:"idle",seconds:0,intervalId:null}});var container=document.getElementById("exercises");function render(){container.innerHTML=exercises.map(function(ex,i){var t=timers[i];var isActive=i===activeIndex;var isCompleted=t.phase==="done";var cardClass="exercise-card";if(isActive)cardClass+=" active";if(isCompleted)cardClass+=" completed";if(ex.isCardio)cardClass+=" cardio";var pills="";if(!ex.isCardio){for(var s=0;s<ex.sets;s++){var pc="set-pill";if(s<t.currentSet)pc+=" done";else if(s===t.currentSet&&t.phase!=="idle"&&t.phase!=="done")pc+=" current";pills+='<div class="'+pc+'">S'+(s+1)+"</div>"}}var timerHTML="",progressHTML="";if(t.phase==="idle"&&!isCompleted){timerHTML='<div class="timer-display"><div class="timer-time work">GO</div><div class="timer-label">'+(ex.isCardio?"Tape pour démarrer le cardio":"Tape pour lancer la série 1")+"</div></div>"}else if(t.phase==="work"){if(ex.isCardio){var rem=Math.max(0,ex.cardioDuration-t.seconds);var pct2=(t.seconds/ex.cardioDuration*100).toFixed(0);timerHTML='<div class="timer-display"><div class="timer-time cardio-color">'+formatTime(rem)+'</div><div class="timer-label">Stairmaster — tiens le rythme !</div></div>';progressHTML='<div class="progress-bar"><div class="progress-fill cardio" style="width:'+pct2+'%"></div></div>'}else{timerHTML='<div class="timer-display"><div class="timer-time work">'+formatTime(t.seconds)+'</div><div class="timer-label">'+ex.reps+" reps — série "+(t.currentSet+1)+"/"+ex.sets+"</div></div>"}}else if(t.phase==="rest"){var pct=((ex.rest-t.seconds)/ex.rest*100).toFixed(0);timerHTML='<div class="timer-display"><div class="timer-time rest resting">'+formatTime(t.seconds)+'</div><div class="timer-label">Repos — prochaine série dans…</div></div>';progressHTML='<div class="progress-bar"><div class="progress-fill rest" style="width:'+pct+'%"></div></div>'}else if(t.phase==="done"){timerHTML='<div class="timer-display"><div class="timer-time done-color">✓</div><div class="timer-label">Terminé !</div></div>'}var btnHTML="";if(t.phase==="work"){if(ex.isCardio)btnHTML='<div class="btn-row"><button class="btn btn-cardio" onclick="event.stopPropagation();finishSet('+i+')">Arrêter</button></div>';else btnHTML='<div class="btn-row"><button class="btn btn-primary" onclick="event.stopPropagation();finishSet('+i+')">Série terminée</button></div>'}else if(t.phase==="rest")btnHTML='<div class="btn-row"><button class="btn btn-secondary" onclick="event.stopPropagation();skipRest('+i+')">Passer le repos</button></div>';return'<div class="'+cardClass+'" onclick="toggleExercise('+i+')"><div class="exercise-number">'+(i+1)+'</div><div class="exercise-name">'+ex.name+'</div><div class="exercise-meta"><div class="meta-box"><div class="meta-label">Charge</div><div class="meta-value">'+ex.weight+'</div></div><div class="meta-box"><div class="meta-label">Séries</div><div class="meta-value">'+ex.sets+"×"+ex.reps+'</div></div><div class="meta-box"><div class="meta-label">Repos</div><div class="meta-value">'+(ex.rest?ex.rest+"s":"—")+'</div></div></div><div class="tip">'+ex.tip+'</div><div class="tracker" style="display:'+(isActive?"block":"none")+'"><div class="sets-row">'+pills+"</div>"+timerHTML+btnHTML+progressHTML+"</div></div>"}).join("")}function formatTime(sec){var m=Math.floor(sec/60),s=sec%60;return m>0?m+":"+(s<10?"0":"")+s:""+s}function toggleExercise(i){var t=timers[i];if(t.phase==="done")return;if(activeIndex===i){if(t.phase==="idle")startWork(i);return}activeIndex=i;if(t.phase==="idle")startWork(i);render()}function startWork(i){var t=timers[i];var ex=exercises[i];t.phase="work";t.seconds=0;clearInterval(t.intervalId);if(ex.isCardio){t.intervalId=setInterval(function(){t.seconds++;if(t.seconds>=ex.cardioDuration){clearInterval(t.intervalId);t.phase="done";vibrate([100,50,100,50,200]);render();return}render()},1000)}else{t.intervalId=setInterval(function(){t.seconds++;render()},1000)}render()}function finishSet(i){var t=timers[i],ex=exercises[i];clearInterval(t.intervalId);if(ex.isCardio){t.phase="done";vibrate([100,50,100,50,200]);render();return}t.currentSet++;if(t.currentSet>=ex.sets){t.phase="done";vibrate([100,50,100,50,200]);render();return}t.phase="rest";t.seconds=ex.rest;vibrate([100,50,100]);t.intervalId=setInterval(function(){t.seconds--;if(t.seconds<=0){clearInterval(t.intervalId);vibrate([200,100,200]);startWork(i);return}if(t.seconds<=3)vibrate([50]);render()},1000);render()}function skipRest(i){clearInterval(timers[i].intervalId);startWork(i)}function vibrate(p){if(navigator.vibrate)navigator.vibrate(p)}render();
</script>
</body>
</html>
